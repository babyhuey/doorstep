name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Black
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install black
        run: pip install black

      - name: Check formatting
        run: black --check .

  # Dependency vulnerability scanning is handled by Dependabot (see .github/dependabot.yml)
